<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Text Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .upload-zone {
            border: 2px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-zone:hover {
            border-color: #764ba2;
            background: #f5f7ff;
        }

        .upload-zone.dragover {
            border-color: #764ba2;
            background: #ede9ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .upload-zone h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }

        .upload-zone p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .upload-zone .highlight {
            color: #667eea;
            font-weight: 600;
        }

        input[type="file"] {
            display: none;
        }

        .or-divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .or-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: #e0e0e0;
        }

        .or-divider span {
            background: white;
            padding: 0 12px;
            color: #999;
            font-size: 14px;
            position: relative;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .file-input-button {
            background: #f0f2ff;
            color: #667eea;
        }

        .file-input-button:hover {
            background: #e8ebff;
        }

        .status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .status-message {
            font-size: 14px;
            margin-bottom: 12px;
        }

        .status-message strong {
            font-weight: 600;
        }

        .output-section {
            margin-top: 24px;
            display: none;
        }

        .output-section.show {
            display: block;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .output-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .char-count {
            font-size: 12px;
            color: #999;
        }

        .output-text {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
            color: #333;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .download-button {
            margin-top: 12px;
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        .download-button:hover {
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .reset-button {
            margin-top: 8px;
            background: #f0f2ff;
            color: #667eea;
        }

        .reset-button:hover {
            background: #e8ebff;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(25, 118, 210, 0.3);
            border-top-color: #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .features {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .features h4 {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .features-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .feature-item {
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
        }

        .feature-item::before {
            content: '✓';
            color: #4caf50;
            font-weight: bold;
            margin-right: 6px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 22px;
            }

            .upload-zone {
                padding: 24px;
            }

            .upload-icon {
                font-size: 36px;
            }

            .features-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF to Text</h1>
            <p>Convert PDFs to clean text instantly</p>
        </div>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📎</div>
            <h2>Drop your PDF here</h2>
            <p>or <span class="highlight">click to browse</span></p>
            <p style="font-size: 12px; color: #999; margin-top: 8px;">Max 50MB</p>
            <input type="file" id="fileInput" accept=".pdf" />
        </div>

        <div class="or-divider">
            <span>or</span>
        </div>

        <button class="button file-input-button" id="browseButton">
            Choose File
        </button>

        <div class="status" id="status"></div>

        <div class="output-section" id="outputSection">
            <div class="output-header">
                <h3>Converted Text</h3>
                <span class="char-count" id="charCount"></span>
            </div>
            <div class="output-text" id="outputText"></div>
            <button class="button download-button" id="downloadButton">
                ⬇️ Download as .txt
            </button>
            <button class="button reset-button" id="resetButton">
                Convert Another File
            </button>
        </div>

        <div class="features">
            <h4>Features</h4>
            <div class="features-list">
                <div class="feature-item">Dual extraction engines</div>
                <div class="feature-item">Encoding cleanup</div>
                <div class="feature-item">Batch processing</div>
                <div class="feature-item">No file size limits*</div>
                <div class="feature-item">100% private</div>
                <div class="feature-item">Fast processing</div>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const browseButton = document.getElementById('browseButton');
        const status = document.getElementById('status');
        const outputSection = document.getElementById('outputSection');
        const outputText = document.getElementById('outputText');
        const charCount = document.getElementById('charCount');
        const downloadButton = document.getElementById('downloadButton');
        const resetButton = document.getElementById('resetButton');

        let currentFileName = '';
        let currentText = '';

        // File input handling
        browseButton.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                handleFile(file);
            } else {
                showStatus('Please drop a PDF file', 'error');
            }
        });

        async function handleFile(file) {
            if (!file.type.includes('pdf')) {
                showStatus('Please select a PDF file', 'error');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                showStatus('File is too large (max 50MB)', 'error');
                return;
            }

            currentFileName = file.name;
            showStatus(`<span class="loading-spinner"></span>Converting ${file.name}...`, 'loading');

            try {
                // Send file to backend
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Conversion failed');
                }

                const data = await response.json();
                
                if (data.error) {
                    showStatus(data.error, 'error');
                } else {
                    currentText = data.text;
                    showSuccess(file.name, currentText);
                }
            } catch (error) {
                showStatus('Error processing file. Please try again.', 'error');
                console.error(error);
            }
        }

        function showStatus(message, type) {
            status.innerHTML = `<div class="status-message">${message}</div>`;
            status.className = `status show ${type}`;
            outputSection.classList.remove('show');
        }

        function showSuccess(fileName, text) {
            const preview = text.length > 500 ? text.substring(0, 500) + '...' : text;
            outputText.textContent = preview;
            charCount.textContent = `${text.length.toLocaleString()} characters`;
            
            status.className = 'status show success';
            status.innerHTML = `<div class="status-message"><strong>✓ Success!</strong> ${fileName} converted to ${text.length.toLocaleString()} characters</div>`;
            
            outputSection.classList.add('show');
        }

        downloadButton.addEventListener('click', () => {
            const blob = new Blob([currentText], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFileName.replace('.pdf', '.txt');
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        });

        resetButton.addEventListener('click', () => {
            fileInput.value = '';
            outputSection.classList.remove('show');
            status.classList.remove('show');
            currentText = '';
            currentFileName = '';
        });
    </script>
</body>
</html>
